<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kredi Simülatörü</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #F5F7FA;
    }

    .bank-header {
      color: rgb(13, 37, 117);
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      margin-left: 15px;
      margin-top: 30px;
      font-size: 30px;
    }

    .form input,
    .form select {
      max-width: 100%;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 40px;
      width: 100%;
      padding: 30px;
      align-items: start;
    }
    .header {
      height: 90px;
      border: 1px rgb(51, 39, 159) solid;
      width: 100%;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      display: flex;
      justify-content: space-between;
    }
    .login {
      margin-right: 20px;
      border: 0 black solid;
      border-radius: 5px;
      width: 150px;
      height: 15px;
      gap: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .button-sifirla {
      border-radius: 20px;
      background-color: aliceblue;
      margin-right: 25px;
    }

    .form {
      font-size: 18px;
      margin-top: 10px;
      width: 100%;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

    }

    .form select {
      border-radius: 50px;
      border: 1px solid #ccc;
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
    }

    .form input[type="text"],
    .form input[type="number"] {
      border-radius: 50px;
      border: 1px solid #ccc;
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
    }

    .form input:focus {
      border: 1px solid #3b82f6;
    }

    .form button {
      background-color: rgb(24, 63, 192);
      ;
      color: #ffffff;
      width: 100px;
      height: 50px;
      border-radius: 50px;
    }

    .form button:hover {
      transition: 0, 4s;
      box-shadow: 0 5px #666;
      transform: translateY(4px);

    }

    .header .button-sifirla {
      background-color: rgb(24, 63, 192);
      ;
      color: #ffffff;
      width: 100px;
      height: 50px;
      border-radius: 50px;

    }

    .header .button-sifirla:hover {
      transition: 0, 4s;
      box-shadow: 0 5px #666;
      transform: translateY(4px);
    }

    .form h2 {
      color: rgb(13, 37, 117);
      ;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .speedometer-container {
      border: 3px rgb(255, 255, 255) solid;
      /* width: 400px; */
      /* height: 400px;
              border-radius: 50%; */
      top: 120px;
      margin: 0;
      z-index: 9999;
      justify-self: center;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1/1;
      border-radius: 50%;
      position: relative;
      justify-self: center;
      align-self: start;
    }

    .center-point {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgb(0, 0, 0);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
    }

    .speedometer-scale {
      border: 3px rgb(255, 255, 255) solid;
      position: absolute;
      top: 10px;
      left: 197px;
      width: 2px;
      height: 396px;
      transform: rotate(-90deg);
      background-color: rgb(255, 255, 255);
    }

    .speedometer-scale-1 {
      transform: rotate(-54deg);
      border: 3px rgb(255, 255, 255) solid;
      position: absolute;
      top: 10px;
      left: 197px;
      width: 2px;

      height: 396px;
      background-color: rgb(255, 255, 255);
    }

    .speedometer-scale2 {
      transform: rotate(-18deg);
      border: 3px rgb(252, 251, 251) solid;
      position: absolute;
      top: 10px;
      left: 197px;
      display: none;
      width: 2px;
      height: 396px;
      background-color: rgb(255, 255, 255);
    }

    .speedometer-scale3 {
      transform: rotate(18deg);
      border: 3px rgb(255, 255, 255) solid;
      position: absolute;
      top: 10px;
      left: 197px;
      width: 2px;
      height: 396px;
      background-color: rgb(255, 255, 255);
    }

    .speedometer-scale4 {
      transform: rotate(54deg);
      border: 3px rgb(255, 255, 255) solid;
      position: absolute;
      top: 10px;
      left: 197px;
      width: 2px;
      height: 396px;
      background-color: rgb(255, 255, 255);
    }

    .speedometer-center-hide {
      width: 450px;
      height: 205px;
      top: 200px;
      right: 5px;
      left: -2px;
      background-color: #F5F7FA;
      position: absolute;
      border-radius: 0;
      z-index: 10000;
    }

    .slice {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      top: -10px;
      left: -10px;
      background: conic-gradient(red 0deg,
          red 36deg,
          transparent 36deg);
    }
    .needle {
      position: absolute;
      width: 10px;
      border-radius: 50%;
      height: 100px;
      background: rgb(95, 94, 94);
      left: 50%;
      bottom: 50%;
      transition: transform 1s ease;
      transform: translateX(-50%) rotate(-90deg);
      transform-origin: bottom center;
    }

    .color1 {
      background: conic-gradient(rgb(237, 205, 3) 0deg, rgb(246, 255, 0) 36deg, transparent 36deg);
      transform: rotate(-18deg);
    }

    .color2 {
      background: conic-gradient(rgb(255, 0, 0) 0deg, rgb(255, 0, 0) 36deg, transparent 36deg);
      transform: rotate(-54deg);
    }

    .color3 {
      background: conic-gradient(rgb(148, 0, 0) 0deg, rgb(148, 0, 0) 36deg, transparent 36deg);
      transform: rotate(-90deg);
    }

    .color4 {
      background: conic-gradient(rgb(0, 255, 17) 0deg, rgb(0, 255, 17) 36deg, transparent 36deg);
      transform: rotate(18deg);
    }

    .color5 {
      background: conic-gradient(rgb(0, 105, 5) 0deg, rgb(0, 105, 5) 36deg, transparent 36deg);
      transform: rotate(54deg);
    }

    .number {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center;
      font-size: 20px;
    }

    .n300 {
      transform: rotate(-160deg) translate(220px) rotate(160deg);
    }

    .kira {
      display: none;
    }

    .n410 {
      transform: rotate(-126deg) translate(220px) rotate(126deg);
    }

    .n520 {
      transform: rotate(-90deg) translate(220px) rotate(90deg);
    }

    .n630 {
      transform: rotate(18deg) translate(220px) rotate(18deg);
    }

    .n740 {
      transform: rotate(54deg) translate(220px) rotate(54deg);
    }

    .n850 {
      transform: rotate(126deg) translate(220px) rotate(126deg);
    }

    @media(max-width:768px) {
      .container {
        flex-direction: column;

      }
    }
  </style>
</head>

<body>
  <header>
    <div class="box">
      <div class="header">
        <h2 class="bank-header">Credit Analyzer</h2>
        <div class="login">
          <p id="kullanici"></p>
        </div>
      </div>
  </header>
  <div class="container">
      <div class="form">
        <form action="">
          <h2>Kişisel Bilgiler</h2><br>
          <span>Ad Soyad </span><br><input type="text" id="ad"><br>
          <span>Yaş</span><br><input type="number" id="yas"><br>
          <span>Aylık Gelir</span><br><input type="number" id="aylikGelir"><br>
          <span>Borç</span><br><input type="number" id="borc"><br>
          Kira Var Mı?<br>
          <input type="radio" name="kiravarmi" value="evet" id="evet"><label for="evet">Evet</label><br>
          <input type="radio" name="kiravarmi" value="hayir" id="hayir"><label for="hayir">Hayır</label><br>
          <div class="kira">
            Kira Tutarı:</span><br> <input type="text" id="kiraTutar"></div>
      </div>

      <div class="form kredi-form">
        <H2>Kredi Bilgileri</H2>
        Kredi Türü <br>
        <select name="kredi" id="krediTuru">
          <option value="ev">Ev Kredisi</option>
          <option value="tasit">Taşıt Kredisi</option>
          <option value="ihtiyac">İhtiyaç Kredisi</option>
        </select><br>
        İstenen Tutar <br><input type="number" id="istenen"><br>
        Vade <br>
        <select name="vade" id="vade">
          <option value="3">3 Ay</option>
          <option value="6">6 Ay</option>
          <option value="9">9 Ay</option>
          <option value="12">12 Ay</option>
        </select><br>
        <span>Faiz Oranı </span><br><input type="number" id="faiz"><br>
        Sigortalı Mı?<br> <input type="checkbox" id="sigorta"><br>
        Gecikme Var Mı?<br><input type="checkbox" id="gecikme"><br>
        <button id="hesapla">Hesapla</button>
      
    
    </form>
  </div>
  <div class="speedometer-container">
    <div class="speedometer-center-hide"></div>
    <div class="speedometer-scale"></div>
    <div class="slice color1"></div>
    <div class="speedometer-scale-1"></div>
    <div class="slice color2"></div>
    <div class="speedometer-scale2"></div>
    <div class="slice color3"></div>
    <div class="speedometer-scale3"></div>
    <div class="slice color4"></div>
    <div class="speedometer-scale4"></div>
    <div class="slice color5"></div>
    <div class="needle"></div>
    <div class="center-point"></div>
    <div class="number n300"></div>
    <div class="number n410"></div>
    <div class="number n520"></div>
    <div class="number n630"></div>
    <div class="number n740"></div>
    <div class="number n850"></div>
  </div>

  <div class="sonuc"></div>
  </div>


















  <script src="banka-simülator.js"></script>
</body>

</html>
